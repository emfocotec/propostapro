<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recuperar Senha — PropostaBR</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/main.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo"><a href="/">Proposta<span>BR</span></a></div>

    <!-- PASSO 1: Solicitar reset -->
    <div id="step-request">
      <h1 class="auth-title">Recuperar senha</h1>
      <p class="auth-sub">Digite seu e-mail e enviaremos o link para criar uma nova senha.</p>
      <div class="alert alert-error"   id="err-request"></div>
      <div class="alert alert-success" id="ok-request"></div>
      <div class="form-group">
        <label for="email">E-mail da conta</label>
        <input type="email" id="email" placeholder="seu@email.com" autocomplete="email">
      </div>
      <button class="btn-auth" id="btn-request" onclick="requestReset()">Enviar link de recuperação</button>
      <div class="auth-footer"><a href="/login">← Voltar para o login</a></div>
    </div>

    <!-- PASSO 2: Nova senha (aparece quando tem token na URL) -->
    <div id="step-reset" style="display:none;">
      <h1 class="auth-title">Criar nova senha</h1>
      <p class="auth-sub">Digite sua nova senha abaixo.</p>
      <div class="alert alert-error"   id="err-reset"></div>
      <div class="alert alert-success" id="ok-reset"></div>
      <div class="form-group">
        <label for="new-password">Nova senha</label>
        <input type="password" id="new-password" placeholder="Mínimo 8 caracteres (letras e números)">
      </div>
      <div class="form-group">
        <label for="confirm-password">Confirmar nova senha</label>
        <input type="password" id="confirm-password" placeholder="Repita a nova senha">
      </div>
      <button class="btn-auth" id="btn-reset" onclick="resetPassword()">Salvar nova senha</button>
    </div>

  </div>
</div>

<script>
// Detecta se tem token na URL (/recuperar-senha?token=XXXXX)
const urlParams  = new URLSearchParams(window.location.search);
const resetToken = urlParams.get('token');

if (resetToken) {
  // Mostra formulário de nova senha
  document.getElementById('step-request').style.display = 'none';
  document.getElementById('step-reset').style.display   = 'block';
  document.getElementById('confirm-password').addEventListener('keydown', e => {
    if (e.key === 'Enter') resetPassword();
  });
}

// ── SOLICITAR RESET ──
async function requestReset() {
  const email = document.getElementById('email').value.trim();
  const btn   = document.getElementById('btn-request');
  clearMsg('err-request'); clearMsg('ok-request');

  if (!email) { showMsg('err-request', 'Digite seu e-mail.'); return; }

  btn.disabled = true; btn.textContent = 'Enviando...';

  try {
    const res  = await fetch('/api/auth/forgot-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });
    // Sempre mostra a mesma mensagem (segurança)
    showMsg('ok-request', 'Se este e-mail estiver cadastrado, você receberá as instruções em instantes. Verifique também a caixa de spam.');
    document.getElementById('email').value   = '';
    document.getElementById('btn-request').textContent = 'Link enviado ✓';
  } catch (err) {
    showMsg('ok-request', 'Se este e-mail estiver cadastrado, você receberá as instruções em instantes.');
  } finally {
    btn.disabled = true;
  }
}

// ── CRIAR NOVA SENHA ──
async function resetPassword() {
  const password        = document.getElementById('new-password').value;
  const passwordConfirm = document.getElementById('confirm-password').value;
  const btn             = document.getElementById('btn-reset');
  clearMsg('err-reset'); clearMsg('ok-reset');

  if (!password || !passwordConfirm)    { showMsg('err-reset', 'Preencha os dois campos.'); return; }
  if (password !== passwordConfirm)     { showMsg('err-reset', 'As senhas não coincidem.'); return; }
  if (password.length < 8)             { showMsg('err-reset', 'Senha deve ter pelo menos 8 caracteres.'); return; }
  if (!/(?=.*[a-zA-Z])(?=.*[0-9])/.test(password)) {
    showMsg('err-reset', 'Senha deve conter letras e números.'); return;
  }

  btn.disabled = true; btn.textContent = 'Salvando...';

  try {
    const res  = await fetch(`/api/auth/reset-password/${resetToken}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password, passwordConfirm })
    });
    const data = await res.json();

    if (!res.ok) {
      showMsg('err-reset', data.message || 'Link inválido ou expirado. Solicite um novo.');
      btn.disabled = false; btn.textContent = 'Salvar nova senha';
      return;
    }

    // Salva token e redireciona logado
    localStorage.setItem('pp_token', data.token);
    localStorage.setItem('pp_user',  JSON.stringify(data.data.user));

    showMsg('ok-reset', 'Senha redefinida! Redirecionando...');
    setTimeout(() => window.location.href = '/dashboard', 1500);
  } catch (err) {
    showMsg('err-reset', 'Erro de conexão. Tente novamente.');
    btn.disabled = false; btn.textContent = 'Salvar nova senha';
  }
}

function showMsg(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.classList.add('show');
}
function clearMsg(id) {
  document.getElementById(id).classList.remove('show');
}
</script>
</body>
</html>
