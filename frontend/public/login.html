<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrar — PropostaPro</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/main.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo"><a href="/">Proposta<span>Pro</span></a></div>
    <h1 class="auth-title">Bem-vindo de volta</h1>
    <p class="auth-sub">Entre na sua conta para acessar suas propostas.</p>
    <div class="alert alert-error" id="alert-error"></div>
    <div class="alert alert-success" id="alert-success"></div>
    <div class="form-group">
      <label for="email">E-mail</label>
      <input type="email" id="email" placeholder="seu@email.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label for="password">Senha</label>
      <input type="password" id="password" placeholder="Sua senha" autocomplete="current-password">
    </div>
    <button class="btn-auth" id="btn-login" onclick="handleLogin()">Entrar</button>
    <div class="auth-footer">
      Não tem conta? <a href="/cadastro">Criar conta grátis</a><br>
      <a href="/recuperar-senha" style="color:var(--ink3);font-size:13px;margin-top:8px;display:block;">Esqueci minha senha</a>
    </div>
  </div>
</div>
<script>
const token = localStorage.getItem('pp_token');
if (token) window.location.href = '/dashboard';

document.getElementById('email').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('password').focus(); });
document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });

const urlParams = new URLSearchParams(window.location.search);
if (urlParams.get('reset') === 'ok') showSuccess('Senha redefinida com sucesso! Faça login.');

async function handleLogin() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('btn-login');
  clearAlerts();
  if (!email || !password) { showError('Preencha e-mail e senha.'); return; }
  btn.disabled = true; btn.textContent = 'Entrando...';
  try {
    const res  = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (!res.ok) { showError(data.message || 'E-mail ou senha incorretos.'); return; }
    // SALVA TOKEN E USUÁRIO
    localStorage.setItem('pp_token', data.token);
    localStorage.setItem('pp_user',  JSON.stringify(data.data.user));
    const redirect = urlParams.get('redirect');
    window.location.href = redirect ? decodeURIComponent(redirect) : '/dashboard';
  } catch (err) {
    showError('Erro de conexão. Verifique sua internet.');
  } finally {
    btn.disabled = false; btn.textContent = 'Entrar';
  }
}
function showError(msg)   { const e = document.getElementById('alert-error');   e.textContent = msg; e.classList.add('show'); }
function showSuccess(msg) { const e = document.getElementById('alert-success'); e.textContent = msg; e.classList.add('show'); }
function clearAlerts()    { document.getElementById('alert-error').classList.remove('show'); document.getElementById('alert-success').classList.remove('show'); }
</script>
</body>
</html>
